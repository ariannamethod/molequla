# Railway service config for the molequla ecology.
# Pairs with Dockerfile + launcher.sh in the repo root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# launcher.sh exits 1 on any organism death so Railway respawns the whole
# ecology (one fallen organism = full restart, simpler than partial recovery).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# No HTTP port — ecology is background, accessed via Railway logs / GraphQL.
